body:
  text: 潔齊毛詩經筵講義卷二宋袁燮撰行露篇臣聞莫難于聽訟嚚訟之人顚倒是非變亂黑白其情僞萬狀若之何聽之然天下萬事不逃乎理善聽訟者以理裁之而孰能肆其欺乎厭浥者露濃之貌所以不敢夜行者畏露之濡其身也女以貞信自守惟恐少有㸃汚冰清玉潔克保其身豈容彊暴之男得以侵陵哉明于聽訟者視其貌察其言觀其理之然否固知其大節之無虧矣雀雖能穿屋而雀實未嘗有角鼠雖能穿墉而鼠實未嘗有牙牙牡齒也鼠之所無故借以為喻此言女雖速于獄訟而女實未嘗有室家之情也不明者惑于形似遂以為真而明者觀之知女之無邪猶雀之無角鼠之無牙也豈可以穿墉之故而遂謂其真有角牙哉曰室家不足曰亦不女從女子潔白之操于是乎著見矣大學傳曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志夫惟是心清明無隱不燭能使巧僞無實者不肆其浮辭此使民無訟之道也召伯躬行此道心無毫髮之私臨民決訟洞見肺肝此所謂明于南國也君天下者得如斯人者而委任之天下無冤民矣嗚呼偉哉羔羊篇臣聞人臣委質以事君所食者君之祿也然得之而由其道居之而稱其職無愧于此心則雖官尊祿厚食之安焉反是則不安矣何者君子無終食之間違仁茍非其道無其功而徒食其食則其違仁也甚矣嗟來之食雖死不受義重于死故也此詩三章皆以退食自公為言進而入于公朝有補于國退而食于私家無愧于心委蛇委蛇者此心無愧所以舒泰而有餘裕也羔小羊也素絲所以英裘紽數緎縫也總亦數也曷為有取于羔羊曰禽獸之食不擇美惡茍可以飽而已不茍于食者其為羊乎人或踐之則不食稍有塗汚則不食寧終日飢餓而所不欲者終不可彊表裏莫不精潔古人貴之故取以為裘而又英之以素絲大夫服之以居服其服而無愧心則可以稱其服矣食其食而不能如羔羊之精潔將何以稱斯服乎序詩者曰鵲巢之功至聖人之化始于閨門而達于朝廷故在位者皆節儉而正直也後之為人臣者誦此一詩豈可不勵其精潔之操而深以貪濁為戒君天下者觀此一詩豈可不崇奬夫精潔之臣而屏去夫貪濁之吏哉殷其靁篇臣聞人與羣物竝生于天地之間而人所以獨貴者義在焉爾義者理之所當然也人不知義則無以異于羣物是以古人甚重之一舉一錯不敢違也上以是化其下下以是從其上如好色惡臭之不可相亂如東西南北之不可易位始可謂知義矣觀殷其靁之詩何其明于君臣之義歟殷靁聲也山南曰陽何斯者何人至于斯也違斯者離其所而行也振振信厚也夫逺役于外而其婦思之聞靁之發聲而知天之必雨冒雨而行不遑自恤惟知君命之重而忘其為一巳之勞此所以為信厚君子也非篤于君臣之義其能若是乎召南之大夫賢于常人也逺矣至于婦人女子世所難化者亦明于斯義豈不尤可貴歟獨居于家曽無怨辭方且美其夫之信厚而有歸哉歸哉之語世俗之所謂歸者夫婦共處足以相歡也而此詩所云非是之謂奉命而行事竟而返有以復命斯其為歸也美矣此人臣事君之義也可不勉乎好逸惡勞人之常情也男女相悅亦人之情也今其為夫者知君之為尊而不知為勞為婦者能勉夫以義而忘其為悅君君臣臣夫夫婦婦一詩之中燦然著見焉此所以為治古之盛也嗚呼休哉江有汜篇臣觀小星江有汜二詩雖所遇不齊然其以心感心則一也小星之夫人無妒忌之行加惠于妾媵故為妾者感之安于定分而夫人之善益彰江有汜之媵事忌克之嫡雖勞而不怨故為嫡者感之悔其前非而媵之美益顯然則人心未有不可感發者曰汜曰渚曰沱皆江之支流也決復入者為汜岐而成者為渚鄭氏箋云爾而爾雅水自江出者為沱江以喻嫡也汜渚與沱以喻媵也之子指嫡而言歸以言其嫁也不我以不見用也不我與不見取也不我過不見顧也媵足以備數而嫡實梗之不得進御于君人情至此扞格也甚矣既嫡翻然感悟媵于是得其所處而至于相與嘯歌前日妒忌之心皆冰釋矣三復此詩獨言其始之乖戾終之和同而不言其所以至是者此詩人言外之意雖不盡發越而默存于中也故序詩者歸其美于媵而明著其勞而無怨可謂察見其心矣孟子曰行有不得者皆反求諸巳人不見知不以為彼之失而以為我之罪恐懼修省若無所容而又敢怨乎昔者大舜處人子之不幸不見其為父母之頑嚚而負罪引慝齊栗于載見之時此瞽瞍之所以底豫也其勞而不怨之明驗歟區區媵女之微惟能反求諸巳而感格之效立見此亦聖人在上道化流行而當時風俗如此之美也君天下者可不原其所自哉何彼穠矣篇臣聞之記曰肅肅敬也雍雍和也夫敬以和何事不行以是知古人之論德甚貴夫肅雍也凡人之情不失之縱弛則失之乖戾縱弛則不敬乖戾則不和豈其本心然哉降衷秉彝無有不善肅雍之德人人具足然常人既貴而驕驕而侈然自大而失其常度故有縱弛者焉有乖戾者焉賢者秉德有常其身雖貴其心自若此所以天稟之良未嘗少虧也今以王姬而嫁諸侯車服之美止下于王后一等可謂貴矣而肅肅雍雍猶執婦道其不失夫本心者歟何彼曷不皆設問之辭何其華之穠乎豈不肅且雍乎比之唐棣比之桃李既言其容色之盛矣而又美其車車非能肅雍也人有肅雍之德故見其車者如見其人也平王以德而言以平王之孫而適齊侯之子以齊侯之子而娶平王之孫等而言之不敢自大也此亦肅雍之義昏姻之以義合猶釣者之以絲緡也味肅雍之言有無窮之義婦人而有是德豈不能相其夫子乎豈不能正其家人乎詩之稱周王曰雍雍在宫肅肅在廟君子以是知王姬之肅雍王者躬行之化使之然也為人君者豈可不正其本哉騶虞篇臣聞有道之時至和之氣薰蒸于天壤之間必有嘉祥為時而出故關雎之化行則麟趾應之鵲巢之化行則騶虞應之此所謂和氣致祥也鵲巢之詩國君積行纍功以致爵位夫人起家而居有之夫得其為夫婦得其為婦剛柔健順各適其宜此人倫之所以正也人倫正則朝廷正矣天下純被聖人之化而庶類莫不蕃殖和氣之所感也春搜之時葭與蓬茁然而生豝與豵其數以五而人心愛物之深于五豝五豵之中各取其一焉不忍盡殺以逞其欲也詩人言之不足故嗟嘆以美之而比之騶虞于生物則不食于生草則不踐非有所教戒也非有所禁防也是孰使之然哉天稟如是無俟乎勉強也凡有意為之與夫根于自然者等倫相絶善利之所以分王霸之所以異皆由此也意之為纍大矣詩人之有取于騶虞惟其非出于有意也人之仁愛亦如騶虞之自然則王道純全而無虧矣故謂之成當和氣充塞之時騶虞應感而至而詩人因以比德大旨與關雎麟趾同符此正始之明驗也人君可不推原其故歟柏舟篇臣聞天下之患莫大于小人在人主之側蓋小人之心知有已而已不知為國也知有私而已不知有公也朝思夕念不過于爵位之崇祿廪之厚以足夫一己之欲欲心日熾則凡可以阿媚其君者無所不為君有過焉不敢言也朝綱不振國勢寖微知公論之不可逭君子之必見嫉也則凡可以排擯善類者無所不至若此類者委以一職任以一事然且不可況于常在君側乎此君子之所以不得不憂如舟泛然無所底定憂之至也耿耿明也隱痛也吾心明知其為害而吾君不能遠之所以痛心也酒所以供敖遊吾非無之斯心痛切不暇飲也鑒之照物或妍或醜無不受焉故茹茹猶入也小人非我族類其可入吾心乎同僚之義亦有兄弟之親似可訴也而往則見怒其臭味亦殊也石猶可轉而心不可轉席猶可卷而心不可卷其正直如此而又發于威儀人無得而選擇之猶口無擇言身無擇行也其與小人異趣豈不遠哉愠于羣小為羣小所愠也既遇其病又受其侮已拊心以憂故謂之辟日月明之至也居諸語助也今晝夜迭運而光景寖微猶君德寖昏而小人得以蔽之也心之有憂如衣之有垢垢之不去愁沮無聊不能奮飛固其宜也或曰有所憂患則不得其正今憂心如此寧不害于正乎曰國家將危忠臣義士此心如割幸其君之一寤故以屈原之忠而自沈汨羅君子與之未害其為正也人主觀此一詩可不自警乎仁人不用小人在側而使賢者不堪其憂人君實為之也書曰股肱喜哉孟子亦曰尊賢使能俊傑在位則天下之士皆悅而願立于王之朝矣夫使賢者皆有喜樂之心亦人君為之今朝廷有道而忠良之士猶以當時為憂此必有所以然者惟聖主深察之燕燕篇臣聞天下之事不謹其始未有能善其終者發端之始害猶未著故人忽之積日纍月其惡寖長遂致于潰裂四出莫之能禦且莊公之初過于有所惑爾妾巧于求壻主從而悅之此亦人之常情也悅而不已則溺溺而不已則驕驕而不已則僭夫人既失其位嫡嗣何以自存國本一搖庶必奪嫡此豈小故也哉且莊姜無子戴媯實生桓公莊姜以為己子則莊公嫡嗣也其妾有寵是生州吁則莊公之庶子也州吁好兵公弗能禁桓公嗣立成公賊之戴媯失所依倚反其宗國此國家之大變也故莊姜深痛之方其上僭之始姜固已憂之矣然害止于一身故緑衣之序曰傷己而已今州吁敢行無道不君其君國勢將傾豈猶傷己而已乎燕燕之稱謂己及戴媯也情義之厚相與追隨可謂昵矣而其序不紊故羽則參差不一飛則或頡或頏鳴則或上或下未嘗無别也曰泣涕如雨佇立以泣曰實勞我心何其憂之深哉仲氏任只言其可親可信如周官所謂睦姻任恤也溫惠淑謹又申言之其賢如此而遭此大變反于宗國安得而不憂乎非憂戴媯憂衛國也禍變如此莊公實為之而媯不以為怨且勉莊姜以追思先君辭氣薰然無一毫忿戾之心此所謂溫惠淑謹此所謂變風止乎禮義者歟為國家者觀此一詩而知其終之乖離皆其始之耽惑盍亦兢兢業業而毋致于極哉日月篇臣聞有一言而可以盡修身齊家之道者曰此心之明而已人惟一心不明則昏明則是非可否皆天理之正昏則好惡取舍皆人為之私較然如黑白之異色燕越之殊塗也人心豈可以不明哉且莊姜齊侯之子也不為不貴矣碩人一詩皆稱美之辭不為不賢矣為莊公者禮重而親愛固其宜爾曽不見答而妾媵是嬖好惡取舍顚倒如此不明孰甚焉此詩所謂乃如之人者蓋指莊公也比之日月尊之至矣而微有譏焉日月之明無所不照而今也不能致察于帷簿之間能無愧乎逝往也意有所移往而不返溺于嬖妾而不在莊姜失于古人處夫婦之道故曰逝不古處天下有定理嬖寵惑之則其心亂矣故曰胡能有定寧不猶言曽不也心在彼而曾不在我也三章四章亦以日月為稱而止言所以出之方何耶日月經乎中天則其明無所不及初升之明雖明而未遠也書曰視逺惟明孔子答子張之問明曰可謂逺也已矣明固貴夫逺也莊姜之不見答無乃莊公雖明而未逺乎不深言其過而特微其辭示敬心也德音天所同得莊公固有是德音矣以不定之故良心轉為無良甚可惜也然莊姜不欲常置諸胸中要當忘之故曰俾也可忘前三章猶有怨辭至于卒章惟曰父母養我不終至此尚復何言所謂報我者亦不能陳述之矣鳴呼使莊公本心常如日月之明夫婦之間豈至此極哉君人者觀此一詩心之不明其害如是可以為鑒矣終風篇臣聞處順境者易處逆境者難何謂順境人心翕然相應無有齟齬者是也何謂逆境人心悍然不從未易調護者是也于其易也而順受之于其逆也而思所以處之反求諸已積其誠意盡其在我而已莊姜不見答于先君又見侮于州吁甚難處也常人之情遭此逆境無不懈怠而莊姜安于所遇惟自傷其無辜而無嫉妒他人之心故序緑衣日月終風三詩皆以傷己言可謂深探其所存矣風終日而又甚暴喻州吁之虐而見莊姜之柔順則笑侮之猶無逸言小人侮厥父母曰昔之人無聞知也浪放蕩也謔浪笑敖侮之甚矣而莊姜方且哀憐之以為良心善性人所均稟而淪于惡習顚冥至此良可悼也霾雨土也昏暮之狀也雖則昏暮感其母之見棄亦有時而惠然肯來也然終不能勝其惡習暫明而復昏所以莫往莫來也莊姜不嫉惡又從而思之可謂深于愛子矣悼之思之所以興其善心憎之絶之足以遏其惡念莊姜于此慮之熟矣陰而霾曀終風且繼以陰雨不旋日而復曀亦言昏蒙也雨雖不驟重陰未解故曰曀曀靁雖不作而相繼不絶故曰虺虺皆言昏暮也人之善不善明與昏而已寤言不寐憂其昏也願言則嚏願言則懷欲其明也願者善端初發之謂彼願言則我嚏矣鄭康成所謂猶今俗人嚏而曰人道我此感通之理也彼願以為懷矣如周南嗟我懷人之懷不忘于心非不從而已也莊姜可謂曲盡矣而終不能轉移其暴虐之行其下愚不移者歟然子雖不孝母不可以不慈此古人人倫之要觀是詩者觸類而長之則人倫之間蔑有不可處者矣擊鼓篇臣聞興師動衆爭地爭城兵鋒一交肝腦塗地甚可畏也其可輕用也哉然有國有家者非兵無以宣威靈制強暴故亦不得已而用之外禦其侮者為固圉而舉以仁伐不仁者為救民而舉兵出有名故罔不吉何者人心固以為當然操不祥之具彊民于戰鬭之間而不與衆同欲其為從之也難矣今州吁以庶奪嫡親賊其兄罪固不容誅矣乃欲以兵力自彊為平陳與宋之役平成也欲伐鄭而力不能獨辦故結二國之成而共伐之漕邑之城國之土功也可謂勞役矣今伐鄭之師怨苦無聊欲為版築者而不可得故有我獨南行之嘆蓋築者猶可以生還而我則必死所以忡忡然其憂也將行之時與其室家訣别故其言慘戚如此爰於也於何而居於何而處言無定也於何而喪其馬則其兵敗而人亦殆矣求諸林下若所謂收爾骨者何其言之悲歟契闊勤苦之狀也夫婦之義生死同之勤苦共之此一定之論也故曰成說今而不我活矣說可成乎洵亦信也詩人所謂洵美且直皆信然之辭向也約言與子偕老今我先子而死則變而為不信也故曰不我信者此皆夫婦訣别之語州吁亦聞之乎昔孟子論得民心之道所欲與之聚之所惡勿施爾也安居者人所欲而州吁故勞之用兵者人所畏而州吁彊施之欲惡皆違乎民自古及今未有能濟者由是觀之兵其可輕用哉雖然人有疾病以藥攻之時有姦宄以兵伐之雖湯武之得天下何嘗不用兵乎而湯武之舉順乎人心故人無不服此詩所刺咈乎人心故人皆怨之成敗之所以殊也說以使民民忘其勞說以犯難民忘其死如是而用兵人亦何怨之有君人者盍亦深思熟講求所以順乎人心者哉凱風篇臣聞中庸曰射有似乎君子失諸正鵠反求諸其身孟子亦言行有不得者皆反求諸已此言得失之殊途未有不自已出者責人而不責己則本原之地用志不篤見善不遷有過不改而感格之至邈不可冀修已而不責人則朝夕思念求所以齟齬不合者誰實為之積其誠意自足以感人動物此得失之所以殊也昔者舜之事親難莫甚焉舜不見其頑嚚而惟極其敬舜號泣于旻天負罪引慝夔夔齊栗形于載見故雖瞽瞍之不慈亦為之底豫此感格之效也凱風之詩其淵源于此歟凱風云者南方長育萬物之風舜之作歌所謂南風之薰阜民財者是也棘難長之木心發生之初自凱風之吹拂其心始長至于夭夭其盛可以為薪非一朝一夕之故以喻母氏養我七子自襁褓而至于成人其劬勞也久矣而吾母寡居之後不安其室人子于此將何以自處哉男女人之大欲當淫風流行之時漸染惡習與之俱靡此人情之所不能免也母子之際人所難言順從則害義諫止則傷思惟有反躬自責不以為母之過而以為己之咎則庶乎其足以感動矣故曰母氏聖善我無令人泉之清寒者能使人甘之鳥之好音者能使人樂之而我獨不能慰其母是豈母之罪哉比之凱風其稱甚美而寒泉黃鳥之不若其自責也深矣負罪引慝此舜所以為大孝而今也七子之心契合無間古今雖殊人心不異所謂人皆可以為堯舜也雖然子之自責可謂有子矣而母之能從略不見于是詩何哉曰誠可以貫金石而况于人乎未有不可感動者以瞽瞍底豫推之母之能從不言而可知矣觀此詩者處人倫扞格皆能反求諸身始雖未合終必相應矣以之處兄弟則兄友而弟恭以之處夫婦則夫和而妻柔易之繫辭曰觸類而長之豈不信然哉潔齊毛詩經筵講義卷二
