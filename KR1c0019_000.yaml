body:
  text: 絜齋毛詩經筵講義目録詩𩔖卷一詩序一詩序二卷耳樛木螽斯桃夭罝芣苢漢廣汝墳采蘩甘棠卷二行露羔羊殷其靁江有汜何彼穠矣騶虞柏舟燕燕日月終風擊鼓凱風卷三雄雉谷風式微旄丘泉水北門北風干旄考槃芄蘭木𤓰黍離揚之水卷四羔裘女曰鷄鳴山有扶蘇風雨子衿鷄鳴還甫田猗嗟陟岵伐檀碩鼠臣等謹案絜齋毛詩經筵講義宋袁燮撰燮字和叔慶元府鄞縣人絜齋其自號也登進士第調江隂尉歴官寳文閣直學士諡正獻事蹟詳具宋史本傳燮素尚名節學有體用嘉猷讜論無不卓然可紀所著文集巳經散佚今從永樂大典中裒輯為二十四卷别著録集部中此書乃其為崇政殿説書時撰進之本宋史藝文志馬端臨通攷朱彝尊經義攷皆不列其目惟永樂大典各韻經文之下頗載其文蓋其失傳亦巳久矣宋代諸臣所作講章如鄭朴敷文書説朱震范沖左氏講義戴溪春秋講義𩔖多編輯單行燮此書亦同其例其中議論切實和平通達頗得風人本旨且宋自南渡以後國勢孱弱君若臣皆懦怯偷安無肯志存逺略而燮獨以振興恢復之事望其君經幄敷陳再三致意如論式微篇則極稱太王勾踐轉弱為彊而貶黎侯無奮發之心論揚之水篇則謂平王柔弱為可憐論黍離篇則直以汴京宗廟宫闕為言皆深有合于納約自牖之義昔人譏胡安國春秋傳意主復讎割經義以從已説而燮則因經旨所有而推闡之其發揮尤為平正雖當時寜宗闇弱不能因此感悟而其拳拳忠藎之意亦良足尚也謹以次編訂釐為四卷惟雅頌諸篇講義永樂大典原本失載今無可攷補亦姑仍其缺焉乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
