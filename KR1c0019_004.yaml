body:
  text: 潔齊毛詩經筵講義卷四宋袁燮撰羔裘篇臣聞之書曰天命有德五服五章哉夫衣服所以章德也天之所命奉而行之非以私意與之也有如是之德斯有如是之服當與而不與不當與而與之皆非所以奉天命故古人于是致意焉羔裘大夫之服也濡潤澤也豹飾緣以豹皮也晏鮮盛也英裘飾也其服可謂華矣其人必賢乃能相稱不然則所謂彼其之子不稱其服矣洵直且侯信其直且美也舍命不渝見危授命也彥美稱也此古之君子皆稱其服者也鄭之大夫所服之裘非不粲然可觀而察其為人瑣瑣碌碌非所當服而服焉詩人不顯攻之而思古人以寓規警之意知彼之為優則知此之為劣所謂辭不迫切而意獨至也嗚呼人臣策名委質立乎人之本朝固將有益于國家也其可無以稱其服乎人君設官分職錫之朝服以華其躬非徒富貴之也其可不求夫可以稱其服者乎三復是詩深求其義則君臣之道兩得不然則俱失之矣可不謹哉女曰雞鳴篇臣聞人之一心警戒則其德日新宴安則其過日積故傳有之曰宴安鴆毒不可懷也中無所主惡勞喜逸氣體頽惰而不能自持此所以溺于宴安也况于夫婦之間尤人情之所易溺者乎道不足以制欲志不足以帥氣惑于淫姣而不溺焉者鮮矣觀女曰雞鳴之詩何其相警戒之切也女以為雞鳴而士以為昧旦雞鳴之時天猶未明也昧旦則在晦明之間矣女又曰明星有爛則又未旦也子其弋鳧鴈以供飲食乎加者射而中男子之事也宜者烹飪不失其節婦人之職也衽席之上人情之所易安而古之為夫婦者皆不以是為樂未旦而興勤于生理而不敢懈此心清明不為人欲所蔽可不謂賢乎雖然家人嗃嗃與夫婦子嘻嘻者固有間矣然不若交相愛之尤為可貴也此詩以警戒為主而味其宜言飲酒與子偕老琴瑟在御莫不靜好之語則情意浹洽歡然無間琴瑟友之以寓其所樂則不偏于嚴矣嚴以警其怠和以通其情豈非尤可貴者歟抑又有大于此者焉無非無儀惟酒食是議固婦人之賢行也而古人之為賢婦者又不止是今日子所招來而相與為友者吾將雜佩以贈之則其志甚大乃周南之后妃輔佐君子求賢審官之用心也豈非婦人女子之難能乎夫婦交相警戒其德日進遂至于此非溺于宴安者之所能識也孔子存此以為萬世夫夫婦婦之法誠用力于造端之地者可不三復是詩哉山有扶蘇篇臣聞孟軻有言不信仁賢則國空虛春秋傳曰不有君子其能國乎夫仁賢君子國之所恃以安彊者也有之則為朝廷之光無之則為社稷之辱南山有臺樂得賢之詩也曰臺曰萊曰桑曰楊曰把曰李曰栲曰杻曰枸曰榆以喻賢人之衆多也南山北山之崇必有生植之物蔚然茂盛斯稱其為山矣朝廷之尊必有衆多之賢森然㑹集斯稱其為朝廷矣今此詩之大旨亦然扶蘇叢生之木也喬松竦直之木也此山之所宜有者荷華芙蕖也游龍紅草也此隰之所宜有者賢人之盛獨非朝廷之所宜有乎子都者美秀之稱子充者篤實之謂狂言其放肆狡言其險詐如此而是如彼而非如此而正如彼而邪豈不粲然黑白分明哉今子都子充宜見而不見而狂與狡童不宜見而見則是非邪正顚倒錯亂而紀綱法度頽靡廢闕安在其為朝廷之尊乎立政之書曰其勿以憸人其惟吉士書之憸人即詩之狂狡也其意氣似勇決其言論似開敏故世主往往惑焉以為真可信任者此國家之蟊賊也可不芟夷之屏棄之乎公論之所謂美者鄭忽以為惡公論之所謂惡者鄭忽以為美狂狡肆其毒螫而賢者無以自存尚何以保其邦乎知人則哲惟帝其難之故雖堯舜之聖而于此不敢忽何為其不敢忽也似是而非足以亂真取捨不當而禍亂之所從生故也惟聖明致察焉風雨篇臣聞所貴乎君子者不失其本心而已天與人以此心至精至明雖更歷萬變而秉彝之懿未始少虧斯可謂之君子矣故書曰彰厥有常吉哉又曰其惟克用常人常者不變之謂也窮如是達亦如是始如是終亦如是是之謂有常中庸曰國有道不變塞焉强哉矯國無道至死不變強哉矯塞窮也謂不變窮之所守也死者人所甚畏當死則死不以為憚可不謂之强乎强立而不反則可謂有常矣風雨之作淒淒瀟瀟至于有如晦冥未嘗易其節物固自有常也可以人而不如物乎始正而終邪始勤而終怠始明而終昏皆不常其德也皆改其度者也君子則不然吾有此良心斯有此常度規矩準繩不可須臾離也終身守之不以時之汚隆而二其心此人君之所當用也今鄭國之君棄其有常者而用其無常者此詩人之所以思見君子焉未見之時如在險阻中既見則平矣故曰夷未見之時如疾痛之在躬既見則愈矣故曰瘳未見之時此心戚戚然而憂既見則釋然矣此所以喜也嗚呼君子之未見與夫既見人心休戚不同如此國之輕重繫于此故也然則為人君者豈可不汲汲皇皇求天下有常之士而信任之哉子襟篇臣聞人生天地間所以異于羣物者以知有義理而已義理人心之所同皆可以為善然無以講明之則終日昏昏淪于惡習與蠢然無識者殆無以異所謂飽食暖衣逸居而無教則近于禽獸古人病其然設為庠序學校漸摩陶冶使人心曉然皆知義理之可貴不為物欲所遷則教之功也嗚呼是豈可一日廢乎青青子襟謂交領也學子所服也青青子佩謂佩玉也禮士佩瓀珉而青組綬是也士服其服宜在學校而逸遊于外無親師取友之益安在其為士乎縱我不住教而子亦不來學雖音問亦不我通乃自肆于城闕之上以騁望為樂此所謂挑兮達兮也挑達之樂在外義理之樂在內在外之樂俄頃間爾在內之樂生生不窮而人心不明昧于取舍君子安得而不傷之一日而廢飲食不免于饑渴一日而不務學必放其良心良心陷溺將不可以為人此其為害殆有甚于饑渴者此所以一日不見如三月之久也雖然士亦何罪國君不以是為急學校廢而不修所以至是然則為民上者豈可不以教養為先哉雞鳴篇臣聞人無常心由天理而行則是心常明為人欲所蔽則是心必昏男女之欲人情之所不能免也溺于其所愛而忘其為可戒則本然之心日以昏蝕矣古之人以為家不齊不可以治國故必擇賢妃正女資禀不羣而教飭有素者端本于宫壼之間所言所行率由正道朝夕規警而此心之明莫或蔽之矣聞蒼蠅之聲而以為雞鳴見月出之光而以為日出兢兢然惟恐朝臣之既至而吾君之視朝稍晚無以慰士大夫之心不敢以為細故而忽之也蟲飛薨薨東方且明矣而我猶與子甘寢而同夢㑹于朝者皆欲歸其私家久俟于此寧不見憎乎下憎其上不美莫大焉警策昏怠未明求衣視朝不失其節則我與子皆不見憎矣嗚呼為上者何可不念其臣乎中庸曰體羣臣則士之報禮重勞逸休戚同然無間所謂體也卷耳之詩知臣下之勤勞陟彼崔嵬我馬虺隤陟彼高岡我馬𤣥黃居宫闈之內而能體其臣于道塗之艱難此所謂賢后妃也今此詩亦念夫趨朝之臣可不謂賢乎哀公荒淫怠慢無道甚矣此詩不直指其失而惟以古之賢妃所以警其君者言之知彼之為善則知此之為惡幡然自省能改其過是亦賢君也嗚呼其善格君心之非者歟還篇臣聞一國之風俗國君為之也上倡其下者謂之風下從其上者謂之俗故曰君子之德風小人之德草草上之風必偃倡之者善而從之者無不善則風俗日以淳倡之者不善而從之者亦不善則風俗日以薄齊人之俗其初未必皆好田獵馳逐也惟哀公好之故其下亦然如影響之應形聲有不能自已者還便捷貌也茂與昌皆盛也獸生三歲曰肩儇利也臧善也我謂彼為還彼以我為儇我謂彼為茂彼以我為好我謂彼為昌彼以我為臧一國之人好田獵者衆故猝然相遇更相稱譽不能自禁于齒頰之間其始曰還曰儇不過言其捷與利爾猶未以為美也至于曰茂曰好曰昌曰臧則皆以為美矣視田獵馳逐如蹈仁履義之深可貴矣顚倒是非轉移黑白貴其所可賤樂其所可憂人心之昏蒙一至此極哉孟軻有言上有好者下必有甚焉者矣古之人君所以一嚬一笑不敢不謹者蓋懼夫少有過差而國人又將甚于我也此詩無一言譏哀公之失道而獨以其習俗之不美者言之觀枝葉之瘁而本根之蹶不言可知也真善警其君者歟孔子存此詩所以欲萬世為人君者謹其好惡而端其表儀也即其田獵馳逐觸類而長之凡關于風俗者皆當致謹惟聖明深念之甫田篇臣讀孟軻書觀齊宣王欲闢土地朝秦楚蒞中國撫四夷亦可謂大有為之志矣而孟軻則曰以若所為求若所欲盡心力而為之後必有災三復斯言而後知軻之知本也夫人孰無所欲而必顧我之所為果足以得此則可以遂其欲矣所為者卑汚淺陋而欲求光明俊偉之功其可得乎襄公以國君之尊而躬為鳥獸之行瀆亂天倫罪固不容誅矣民事之不修田獵之是好觀其所為無一合于義理者此豈足以立非常之功乎妄意于圖大而無可以圖大之實妄意于服遠而無可以服遠之具此詩之所以刺也田甚廣而力不及則禾稼不茂而稂莠實繁矣人在逺而彊思之則用心徒勞而事功不集矣曷不反而自求退而自省乎此詩人正本之論也雖然妄意于大者逺者固非矣而無志于大者逺者亦豈君子之所貴哉今觀卒章之意猶有望于襄公焉婉兮孌兮總角丱兮言童稚之時也然長之養之未至于甚久而突然冠辨列于成人理之必然也然則大者遠者雖不可以躁求而亦可以馴致豈若田甫田之力不及思遠人者之心徒勞哉觀前二章則知人君不可以妄圖觀後一章則知人君不可以無志惟聖明深察之猗嗟篇臣聞人君有大德有末節身修而家齊家齊而國治德之大者也威儀之可觀技藝之可喜節之未者也目不兩視而明耳不兩聽而聰于此有餘則于彼不足古之人君深知是心之不可分也朝夕念慮惟躬行是急惟家齊是務而薄物細故皆不暇及大者既立小者略之乃所以全其大者也魯桓斃于齊襄夫人姜氏實為之既而往來于齊魯二國曽無顧忌莊公之為人子既不能追痛其父又不能防間其母慙德多矣而惟修其威儀精于技藝為足以悅世俗之耳目毋乃舍本而逐末乎故齊人雖譽之而實譏之抑揚趨蹌言威儀也美目清揚言容貌也射不出正言中的也四矢之反既中而復中也射至于終日而無一不中其藝固精矣而舞則又與樂節相應故謂之選也人見之誰不稱贊而君子觀之以為隱憂何者人惟一心不可以兩用也役其精神于威儀技藝之末豈能不妨其大者乎雖然射所以觀德內志不正外體不直不可以言中其容貌不比于禮其節不比于樂亦非射之善者今此詩三章極稱其善射于此觀德孰曰不可而反以為刺不已誣乎曰射固可貴也不追念其父不防間其母人之大倫乖戾如此而獨精于射豈能掩其惡乎孔子存此一詩所以欲萬世之下為人君者明于大小之辨大者不立其餘何觀射有似乎君子且不足貴況其他技藝所謂詩可以觀者蓋如此陟岵篇臣聞安佚者人情之所甚欲行役者人情之所甚憚也捨室家之樂躬道塗之勞險阻艱于跋履寒暑切于體膚父母兄弟邈焉間隔朝夕懷歸不能自釋此怨讟之所由興今觀陟岵一詩不惟不怨而尊君戴上之心無異于平居之時此所謂變風止乎禮義者歟方其離家之日父則告之曰夙夜無止是欲其不敢自息也母則告之曰夙夜無寐是欲其不遑寢處也兄則告之曰夙夜必偕是欲其與儕類偕行也而三人者之言又皆曰尚愼旃哉丁寧告戒如是其切可不謂賢父母兄乎陟其高山望其父母兄不可見則思其别時告戒之語奉以周旋不敢失墜可不謂賢子弟乎一門之內長幼尊卑知有君而不知有身知有國而不知有家可謂達于大義不蔽其良心矣為下者能忠其上而為上者可不恤其下乎采薇東山之詩序其情而憫其勞入人之深淪于骨髓此所以犯難而忘死也上恤其下下忠其上此所以交通而無間也今日邊烽未息征夫暴露自往年四月至今年三月恰一歲矣盛夏酷熱之時不容解甲至于生蛆隆冬盛寒之際坐臥被甲其冷徹骨糲飯虀羮終年食淡而又驅之戰鬬豈其所樂哉念之恤之聖心之所不能忘也孰若賦勞還之詩各歸其故壘而以其供億之費募沿邊壯勇之士人人可用莫非精兵有捍禦之實無出戍之苦父母兄弟無復相離保護鄉井各致其力計無便于此者惟聖主亟圖之伐檀篇臣聞人主之任官不可有一毫之私所共者天位所治者天職所食者天祿無非天也豈可以己意參之哉故書曰無曠官天工人其代之天至公也代天而行亦必公其心可也賢者親之任之不賢者疏之斥之如權衡焉非有意于輕重如繩墨焉非有意于曲直斯可謂至公矣宜親任者而疏斥之宜疏斥者而親任之安在其為公道乎檀可以為車為輪為輻伐之而置諸河濱此賤者所為也今而賢者身親其勞則失其職矣不稼穡而得禾不狩獵而得禽此所謂無功而受祿也今而在位在職則非其任矣是非顚倒一至于是天工之代豈其然乎彼君子兮指伐檀者言之也得斯人而任之則不素餐矣人臣之患莫大于素餐非有忠言嘉謨也非能竭誠盡瘁也而乘君子之器食君子之祿職業之瘝曠政教之廢闕生民之憔悴皆此曹實為之是豈能有補于國耶今明主憂勤于上而賢否混淆于下尸位素餐者尚多有之怠惰廢弛偷合茍容國之蠧民之殘也擯斥一二以勵其餘而擇其不素餐者親之于是賢士爭奮姦回屏息而綱紀大振矣此當今之先務也惟聖明亟圖之碩鼠篇臣聞善為國者富藏于民不善為國者富藏于府庫君民一體也民既富矣君安得而不富不藏于民而厚斂焉民既竭矣君亦安能獨豐哉故有若之言曰百姓足君孰與不足荀卿言財貨本未源流亦以為本原在下而不在上也彼魏君者何足以知此汲汲于聚斂而民心日離是乃自蹶其本爾貫事也事其君者三歲矣莫我肯顧言未嘗眷顧于我也莫我肯德不以我為德也莫我肯勞不知我之勞也君不恤其民民不戴其君相率而去遠適他邦豈其本心然哉衣食不足無以自給其勢不得不爾鄭國狡童之刺雖曰不美猶可言也今而比之碩鼠殆又甚焉君臨一國國人愛之若父母仰之如日月畏之如雷霆可也而以碩鼠譏之不君其君至是而極矣聖人存此詩所以為重斂之深戒歟始曰樂土之得所中曰樂國之得直固將去矣而卒章則曰誰之永號吾其何之乎惟有永號而已言終不去也君雖無道而終不忍去此謂變風止乎禮義者歟此夫子所以録之也潔齊毛詩經筵講義卷四
