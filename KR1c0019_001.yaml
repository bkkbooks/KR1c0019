body:
  text: 潔齋毛詩經筵講義卷一宋𡊮燮撰詩序一國史明乎得失之迹傷人倫之廢哀刑政之苛吟咏情性以風其上達于事變而懷其舊俗者也故變風發乎情止乎禮義發乎情民之性也止乎禮義先王之澤也臣觀先王盛時禮樂教化薰蒸陶冶人人有士君子之行發而為詩莫非性情之正流風遺俗久而不泯雖更乎衰世而氣脈猶存此變風之作所以皆止于禮義而歸諸先王之澤也詩三百篇不為不多矣而孔子蔽之以一言曰思無邪蓋取其直巳而發粹然一出于正風雅雖變而思之無邪則一而已矣夫寂然不動之謂性有感而發之謂情性無不善則情亦無不善厥名雖殊其本則一故孟子道性善而又曰乃若其情則可以為善矣禮運一篇孔子之遺言也謂喜怒哀樂愛惡欲是七情者弗學而能人之良能也豈有不善者哉大序之作所以發揮詩人之藴奧既曰吟咏情性又曰發乎情民之性也合二者而一之毫髮無差豈非至粹至精同此一源不容以異觀耶大序所謂禮義即孔子所謂無邪也詩人作之以風其上太師采之以獻諸朝以警君心以觀民風以察世變一言一句皆有補于治道人君篤信力行則可以立天下風化之本公卿大夫精思熟講則可以感人君心術之微詩之功用如此自王者之迹熄而微言奧義于是遂絶雖然詩則亡矣此情此性古今無間有能求其端倪得其精粹挈斯世于禮義之域而不失其情性之正則吾之澤即先王之澤也孔子刪詩繫豳于變風之末王通贊之曰言變之可正也夫變可復正則絶可復續矣孰謂微言奧義終于泯滅哉詩序二臣觀大序之作既以風賦比興雅頌為六義又以國風雅頌為四始義云者至理之所在始云者羣言之首也及觀史記孔子世家則以關雎為風始鹿鳴為小雅始文王為大雅始清廟為頌始與大序所言若不相合意者國風雅頌為三百五篇之綱領而關雎鹿鳴文王清廟為國風雅頌之綱領歟皆羣言之首也故謂之始風以一國言雅以天下言今言雅而曰形四方之風以其造端于上形見于下其大指則同也政有興有廢故雅有正有變雅言王政之廢興則風言侯國之得失可推而知也頌告于神明指商周言之德言盛功言成巋然獨隆王者之高致也嗚呼國風雅頌誠萬世人主之學所以緝熙于光明豈可不服膺古訓日進此道而深造夫古人之堂奧哉知一國之風俗其本在一身則吾所以檢其身者當如何表曲則影攲源濁則流汚吾有所未至則一國之俗皆將淪胥于惡矣可不自警乎等而上之所關愈大王政有廢興乃四海九州治亂安危之所從出也其又可忽乎兢兢業業不敢荒寧如朽索之馭如春冰之履庶乎其可矣若夫盛德成功古人廣大之規模也覆載如天地照臨如日月彼之功德如是吾豈可因循茍且僅為中常之主歟此所謂龜鑑也有德斯有功以大學觀之心正意誠德也治國平天下功也本末一貫非有二致而後世止以戡難為功德不足者亦能底一時之績于是乎判為兩途失其指矣大序合而言之其知道之言乎嗚呼王道之盛也雅在王朝而侯國不得有頌及其衰也平王降為國風而魯人頌僖公之美世變之推移如此甚可畏也人主觀此盍亦知所警矣卷耳篇臣聞志者心之所期也所期者如此故所就亦如此登髙山者期至于頂斯至之矣涉巨川者期達于岸斯達之矣所期者大則其規模亦大所期者遠則其謀慮亦遠夫惟遠且大也故謂之志古之人君恥以中常自處而必欲成大有為之事業斯可謂人君之志也古之后妃不以小善自足而必欲輔人君之所欲為斯可謂后妃之志矣夫惟天作之合同心協濟所以德業巍巍至于今仰之卷耳者可以為酒之物也頃筐者易盈之器也易盈而不盈其心固有在矣臣下行役于外而后妃軫念于內故因卷耳之采而思酒醴之成足充吾君勞賜之用此是詩之所以作也人之遠役必思其家故謂之懷人是人也固嘗置諸周行矣今其奉命而行踰越險阻而馬至于虺隤言其病也玄馬色變而黃亦病也馬病如此人勞可知酌以金罍兕觥少解其懷傷之心此所謂體羣臣者也曰瘏曰痡僕與馬俱病矣蓋至于是其勞益甚復云何哉惟有長吁而已寫其勤勞嗟歎之狀以著其思念賢者之心何其所志之遠且大哉夫臣下之勞人君之所當念后妃何預焉今亦切切如是無乃思出其位乎曰此則古之后妃所以過人也凡人之情朝夕思念不出乎蕞爾形體之微茍利于巳經之營之無所不至豈復為當世計乎今也身居乎此而念及于彼慘怛嗟歎惟恐無以慰賢者之心夫賢士大夫吾君所資以共治也得賢則安不得賢則危利害相關如此是乃后妃之所當念也豈可謂出其位之思乎唐長孫后每對太宗稱魏徴之直以社稷臣名之保護其賢成太宗納諫之美嗚呼其有古后妃之遺風哉樛木篇臣聞天下之患莫大于有已有已之心勝則待物之意薄設藩籬分畛域截然判而為二朝思夕慮求足其欲而自一身之外莫之或恤矣何其不仁哉昔者孔子論為仁之道本于克己蓋惟能克去己私則物我渾融他人之利害休戚猶已之利害休戚也是謂之仁仁者人心也人之本心豈有此疆爾界之别哉已欲立而立人已欲達而達人至公至平本無間隔后妃之能逮下存此心而已矣嘗觀世之好嫉妒者惟小人與女子為甚新或間舊則愛有所分非己之利則不得不多方以隔絶之陰私險詖其質相若故嫉妒之心亦不謀而同爾古之后妃豈其然哉深宫之女誰不欲進御于君以己之心忖度他人同此心也樛木之喻何其心之謙虛量之廣大而已私之不立乎木曲而下垂者曰樛惟其下垂也故葛藟得附託之猶衆妾之託于后妃也以此明逮下之義豈不昭然哉上恤其下下親其上閨門之間雍雍如也愈愈如也則君子之心安得不樂君子之樂君子之福也自古享天之備福者其惟君子乎推所由來亦由修身齊家克正其本而已孟子曰身不行道不行于妻子表儀不正人心不服骨肉至親若仇敵然終日戚戚不得須臾寧何福之有后妃之不妒忌固盛德也然刑于寡妻其本固有在矣君天下者盍致思焉螽斯篇臣聞子孫衆多人君莫大之福也則百斯男子孫千億皆見于詩人之詠歌則蕃衍之慶豈非人情之所甚欲哉然后妃有妒忌之心則衆妾絶貫魚之望亦難以覬其昌熾矣夫公足以勝私而不為私蔽心足以御形而不為形役惟恐吾君嗣續之不繁而不暇為一身之計此古之后妃所以卓然過人而螽斯之詩所以作也夫螽果何物耶羣飛害稼春秋書之以為災異蓋蝗類也而詩人何取焉曰詩之託興惟見其生育之蕃有似乎子孫之衆爾亦猶鴟梟雖非嘉祥而徹桑土于未雨得思患豫防之道于是取之也雖然以螽斯興子孫則可謂螽斯無妒忌心則安得而知之今此詩言宜爾子孫者至于三是則后妃之心果能如是物之不妒故其效驗如此也蓋思而得之凡物之以類相從皆其心之和同無間而羣飛蔽天則其尤者焉和同如此則不妒在其中矣然物以類從何可勝計奚獨有取諸此曰古之記者謂螽斯一生九十九子其繁滋也甚矣他物雖以類從而生育未必若螽斯同類既衆而生育又不勝其多則安得而不取之乎嗚呼人物之辨古人甚嚴昏而不明所以為物人心至靈所以貴于羣物也然烏之反哺獺之祭先蟻之有君臣皆有似乎人道亦有放其良心而物之不若者君子蓋深悲之大學述綿蠻黃鳥止于丘隅之詩而繫以孔子之言曰可以人而不如鳥乎由是觀之貴而為人猶或妒忌者可以人而不如螽斯乎然則此詩之作有助于風教多矣桃夭篇臣聞詩人稱人情之相安者未嘗不以宜言之假樂之詩曰宜民宜人取其人民之相安也魯頌曰宜大夫庶士取士大夫之相安也夫人情至于相安則有和順而無乖戾有歡娛而無怨讟豈不甚可貴哉今此詩曰宜其室家宜其家室則夫婦之間雍雍其和交相親愛者至矣又曰宜其家人則非獨夫婦也闔門之內長幼尊卑無不犁然有當于心矣婦人謂嫁曰歸桃之夭夭灼灼其華謂仲春之月婚姻之時也女之始嫁情意未洽而宜家之效固已立應况于寖久乎既詠其華又詠其實又詠其葉以明物物之可嘉也以桃之可嘉媲德之可貴周旋俯仰無所不宜此豈法嚴令具強之使然哉風化之行固有本之者矣后妃無妒忌之行閨門有肅雍之美是非其本歟惠及其下衆妾序進則內無怨女化行于外婚姻以時則國無瘝民此和氣洋溢極治之時也詩人安得不于一篇之中致其意歟雖然婚姻及時後人知是者亦不少矣而人情未免乖戾罕以輯睦聞者又何歟曰此所以有貴于風化也先王之時家道既正教化流行習俗淳美涵濡于禮義之澤久矣之子于歸資性婉淑足宜其家風化使然也非有先王修身正家之本而獨以男女及時為貴此乃不澄其源而欲清其流也又豈能銷乖戾之習而長輯睦之風哉此詩三章曽無一語及于后妃而序詩者推而言之蓋天下之事有可以法禁整齊者而風俗之美非法禁之所能致要必基本所在能用其力故其感召如此歸諸后妃鉤深之論也嗚呼后妃之賢否風俗之美惡繫焉吾身之修不修后妃之賢否繫焉君天下者其可忽哉罝篇臣聞賢人衆多繫乎人君之一身人君者化育之所自出也德有所未至教有所未孚無以陶冶斯世皆入于禮義之域則歸其責于君而人君亦不敢辭其責故曰百姓有過在豫一人古之聖君知其然也兢兢業業不敢荒寧惟人紀是修惟民極是建凡所以善其心者無一日敢忘要其效驗必至于比屋可封人人有士君子之行始無愧于代天司牧之職其或未然亦惟反身修德而已矣罝者設以掩賤者之役也丁丁者椓杙之聲也其役雖賤其人甚武赳赳焉有公侯干城之才亦可謂難能矣又進于是其可以密邇公侯故謂之好仇猶言善匹也以密邇為未足而有腹心之喻即一身言之耳目之視聽手足之舉履非不切也而又有切于此者今曰可為腹心則智慮之深長操守之堅正可仗以立國矣嗚呼貴而賢賤而不肖天下之常理也賢者役人不肖者役于人亦天下之常勢也罝之人執此賤役教養之所不預賓興之所不及宜其才質暗劣不足與進于善也而詩人所稱乃真賢實能之任曽謂是瑣瑣者足以當之乎臣聞之教化之廢推中人而墜于小人之域教化之興引小人而納于君子之途人心無常惟上是聽風行草偃不約而從后妃無妒忌之行其本正矣一家仁一國興仁一家讓一國興讓此詩三章皆以肅肅為稱故謂之好德夫既惟德是好則舉以當真賢實能之任孰謂其不可乎今而後知先王盛時風化所及莫非常人吉士隨取而足有不可勝用者正本之效固如是也而後世每以乏賢為憂亦豈無所自歟序詩者曰關雎之化行則莫不好德觀其迹若不相為謀而心之感通有必然者矣君天下者盍致思焉芣苡篇臣聞易之咸曰聖人感人心而天下和平夫人心至于和平則風俗粹美不可以有加矣無以感之豈能臻此哉然則何以感之曰行逺自邇始治外自內始未有其家不可教而能化行于他人者故宫闈之邃風化之樞機也后妃無妒忌之行其心既和平矣衆妾進御于君不復顧慮則其心亦和且平矣夫和平者人之本心也宫闈之內至和至平皆以有子為樂則風化所覃自近及遠亦孰不以有子為樂哉芣苡者宜子之藥也采采者不一之辭也薄言有之采而得之也掇拾也捋取也袺者以衣貯之而執其袵也襭者以衣貯之而扱其袵于帶間也袵之可矣而復捋之袺之可矣而復襭之此心之切惟恐其不多也區區微物以宜子之故不憚勤勞多方采取詩人深探其心而曲盡其形容之辭若贅而非贅愛其風化之美而不能自已也夫丈夫生而願為之有室女子生而願為之有家人道之婚姻專為嗣續計耳婦人無子將焉用之故有子之願尤為甚切而世降俗薄乃至有生子而不舉者天性之愛滅絶無餘何其與古人大相遠耶蓋樂于有子人之本心有子不樂非其本心然也古人之心至和至平故惟恐乎嗣續之不蕃後人之心不和不平故反以生育為纍爾夫秉彝之初均此一心而習俗美惡不同如此任風化之責者當如之何哉詩人觀夫芣苡之采既為之三詠三歎而序詩者則蔽以一言而曰后妃之美蓋非后妃之賢得其本心則必不能使當時之婦人亦皆遂其本心也尊卑上下皆不失其本心可謂極盛之時矣後之為妃者要當以是為法漢廣篇臣聞人生天地之間所以超然獨貴于羣物者以存是心焉爾心者人之大本也是心茍存雖至微之人足以取重于當世是心不存雖貴為王公其又奚取焉漢之遊女可謂至微矣能正固其守而人皆愛之敬之豈非此心之良天所以與我者卓然不亂故發形于外有足以感動物者歟喬木者其幹上竦非有枝葉下垂可為庇蔭也故不可休息以女之弱譬木之喬若非其倫矣然端方不撓之操似之此所以為古之賢女也以喬木為未足而復有江漢之喻泳潛行也方筏之小者也漢不可以潛行江不可以筏濟此女之不可求也區區女子之微人皆得以輕侮之今乃如漢之廣如江之永不可褻瀆如此豈不賢哉心慕其賢而于錯薪之中為之刈楚以秣其馬刈蔞以秣其駒致惓惓之意庶其降以相從也而終不可從故江漢之喻復申言之嗚呼武夫勃然震怒無敢當者而牽于利欲則撓而從之今女子之所守乃剛徑如是有丈夫所不能為者此無他彼求諸外所以似剛而非剛此得之心所以至柔而能剛也夫莫剛于人心嗟來之食寧死而不受非不愛身也此心卓然而忘其為身也江漢之遊女可嘉可尚惟此心之不昧爾非盛德之君躬行于上表正斯民皆有士君子之行豈能臻此哉彼習俗薄惡男女淫奔恬不知愧者亦其君使然爾然則人君之一身誠風俗美惡之所自出歟汝墳篇臣聞臣之事君猶子之事親也子之心一于親而無他者謂之孝臣之心一于君而無他者謂之忠故大雅曰上帝臨女無二爾心心一而不雜凛凛乎如上帝之鑒臨豈敢有他哉汝墳者汝水之岸其髙如墳也條枚者枝與幹也調飢朝而未食其餒最甚也條肄者今年斬之而來歲復生之木也夫行役于外而妻躬采薪之勞職當然也念其良人而有如晨朝之飢何其切哉蓋至于踰年之後而有不我遐棄之語乃知其初念之至切者憂其去而不復返也古人奉君命而行則不敢顧其身履險犯難有死之道而不遑自恤者以臣之事君大義所在不可少虧也向也憂其棄我今也喜其既見上能承君命而下能保其身則不棄我而死矣此婦人之所以自慰也遠役之苦如彼魴魚至于尾赤可謂勞矣王室之威如火烈烈可謂酷矣人情至此不能不怨然忠臣之心其可怨乎父母孔邇所以寬譬之也紂雖酷虐而西伯方行仁政有父母之恩可恃以安存也嗚呼天下之達道人倫而已人倫之外焉有他道勉勵其夫事君盡忠則夫婦之道篤而君臣之義亦隆矣一詩之中二美具焉此所以為文王之化行乎汝墳之國也風化之美陶冶薰蒸能使為婦人者此心昭然于義理如此是之謂善化後之君天下者可不鑒觀于此哉采蘩篇臣聞祭祀之事古人之所甚重也人孰不奉祭祀而可以奉祭祀者實難是必洞洞屬屬精一不雜有以契夫鬼神之心則可以行此禮矣邦君之配國人所尊謂之小君其職甚不卑也而所謂職者非有他事惟曰奉祭祀是為稱職不足以奉祭祀則失其職矣然則夫人者可不職思其憂乎蘩皤蒿也所謂澗溪沼沚之毛也采而用之有事乎太廟故曰公侯之事又曰公侯之宫宫即廟也物之可薦者亦多矣不及其他而獨有取夫蘩豈不曰交乎神明者在誠而不在物歟誠心不至雖犧牲肥腯粢盛豐備神其吐之矣被之僮僮夙夜在公被首飾也僮僮竦敬之貌也執蘩以助祭而竦敬于宗廟之中亦足以明此心之不放逸矣雖然當祭而致敬祭畢而忘之是誠心易衰也又豈足為敬乎被之祁祁薄言還歸祁祁舒遲也祭義所謂及祭之後陶陶遂遂如將復入也不即安于私室而猶遲遲其歸心足以御其形而不為形所役心不懈則形不倦故既祭之餘無以異于承祭之時也夫是之謂夫人之職以祭祀為職是以誠敬為本也本立則衆美從之豈不甚可貴歟嗚呼祭之明日明發不寐有懷二人古人純一不巳之心于是著見與夫斯須致敬而懈怠隨之固萬萬不侔矣而召南之夫人亦能用力于此味薄言還歸之語而想其中心之所存純一而不雜此所以無愧于幽明也其亦國君躬行表正之明效歟甘棠篇臣聞人心未易感也而感人之深者其惟盛德之君子乎甘棠之詩是巳蔽芾言其盛也茇草舍也拜謂屈而下之説猶舍也或曰説本作稅言其稅駕于兹也人之為政悅人心于一時者易得人心于悠久者難衣食之分人乘輿之濟涉非不悅也而君子則曰小惠未遍曰惠而不知為政淺狹如此又安能使人悠久而不釋歟召伯誠心愛民不自隆貴草居露宿聽訟于甘棠之下未嘗任智術要民譽也而當時愛慕之後人追思之見彼甘棠以為所憩之地而相與共存之不惟勿伐勿敗雖屈而下之亦所不忍何其入人之深耶意者悉其聰明致其忠愛斷其是非曲直無毫髮之差亦猶臯陶明刑邁種厥德而黎民懷之凡形于聽訟者皆是心也心純乎天發而為政皆與天合以我之心感民之心民之不能忘由我之不可忘也周召分陜而治召伯之令名得與周公並傳殆非偶然者三復此詩其得人心如此豈不偉哉後之號為能吏者率以強敏相尚慘刻為賢民疾視之不暇豈復有愛之久而不巳者由是觀之人君之用人當取夫材之足以集事者歟抑取夫德之足以感人者歟誦甘棠之詩宜知所決擇矣潔齋毛詩經筵講義卷一
