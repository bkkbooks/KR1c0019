body:
  text: 潔齊毛詩經筵講義卷三宋袁燮撰雄雉篇臣聞治世之音安以樂其政和亂世之音怨以怒其政乖此大序之說詩所以為治亂之别也今其軍旅數起大夫久役室家閔其夫之勤勞宜若有怨怒其上之語而辭氣薰然獨有治世之遺風此其故何也曰詩發于人心時有治亂之殊心無厚薄之間上雖失道而詩人不忘其君無異于有道之時又何怨怒之云乎此所謂止乎禮義先王之澤也雄雉以喻其大夫逺役于外妻以懷安之故不能偕行遂至于阻隔是我自取之也將以誰咎不怨其上而歸咎于己與常情大不侔矣展誠也受命而行秉心無二惟知君命之重而忘其在己之勞是之謂誠不怨其上而稱美其夫其識高矣隂陽之運日往則月來月往則日來是日月之往未嘗不來也今吾夫遠役而邈無來期其心亦苦矣然豈可以我之怨苦而怨詈其上哉故卒章之意尤篤厚焉百爾君子泛言從役之大夫也我一婦人雖不足以知君子之德行然此心之善人有所同不忮害不貪求可謂善矣故以臧言之不甘己之勞役而害他人之安居者謂之忮以安居為可樂而違道以有請者謂之求此二病者常情所不能免而吾夫無之則行役何往而不善雖久勞于外固未嘗不裕然也有夫如此吾亦可以自慰矣其夫聞之豈不益自勉勵乎一時同役之大夫聞之又豈復怨上乎遍告百爾君子蓋所以警之也孔子曰士而懷居不足以為士矣春秋傳曰宴安鴆毒不可懷也以安居為戒而不以勤勞為憚此君子之德也而婦人能言之其亦賢乎孔子取不忮不求之語以美門人之高弟是誠有契于聖心也讀此詩者可不自警乎谷風篇臣聞所貴乎君子者無他事焉惟不失其本心而已人生而善天之性也有正而無邪有誠而無僞有厚而無薄有天理之公而無人欲之私所謂本心也其始如是其終亦如是雖歷年之久不變乎其初所謂不失也今觀此詩何其人情前後之不類歟谷風謂東風也習習舒和也陰陽和則為雨黽勉同心不宜有怒皆言其和也使夫之情常如其始之和協豈不甚善而本然之心易于蒙蔽久則淫于新昏而忘其舊矣采葑菲者不以其下體之不美而棄之亦猶禮接其婦不以容貌之改前而薄之德音相與偕老以死人情之厚約結之深有如此者至于行道遲遲中心有違則舊室見棄也水涇濁而渭清二水相入而不相雜舊室譬則渭也新昏譬則涇也涇雖甚濁而不能混渭水之清新昏雖獲愛而不能掩舊室之潔湜湜其沚清見底也而良人不以為潔故曰不我屑屑潔也何以知舊室之為潔乎梁笱之取魚所以飬人也夫雖見棄猶不欲自廢其生養之具深則方之舟之淺則泳之游之黽勉求之匍匐救之案此下疑有缺文美菜之蓄凡婦道所當為非不盡力非有毫髮之罪所以知其潔而疾之棄之昧于黑白之辨一至此極獨不思我始之來相與安息情義甚厚而今日乃如是之薄耶墍息也始終不侔所謂失其本心者風俗如是誰實為之故序詩者以為衛人化其上宣公之罪不可掩矣由是觀之為人主者可不正其本哉式微篇臣聞人君有志則危弱可為安彊茍惟無志則終于危弱而不振故曰禍福無常惟人所召趨向一差而天淵不侔矣吁可畏哉太王迫于狄人之侵去邠之岐微弱甚矣而邠人則曰仁人也不可失也從之者如歸市于是乎肇基王迹而詩人稱曰居岐之陽實始翦商越王句踐大敗于吳棲于㑹稽者才五千人爾而臥薪嘗膽念念復讎卒如其志轉危弱而為安彊豈不偉哉黎侯失國以狄人之故寓于他邦非得已也誠能居患難之中勵剛彊之志朝夕思念求反其國懲創既往改絃易轍夫豈終不可為哉而乃即安于衛國曾無奮發之心豈不哀哉中露者暴露之謂泥中者泥塗之謂非邑名也暴露于泥塗之中其辱甚矣而居之不疑此其國之所以終于失也其始也既以無志而失之其終也又以無志而不能復振是可哀也嗚呼諸侯有一國者也不善保之則失其國天子有天下者也不善保之則將如之何故大禹之訓曰豫臨兆民凛乎若朽索之馭六馬成湯克夏之後猶曰栗栗危懼若將隕于深淵誠以王業之重得之難失之易兢兢業業不敢荒寧僅能自保而已觀式微之詩黎侯一失其國而卑微如是真萬世人主保邦之龜鑑也旄丘篇臣聞之詩曰永言配命自求多福孟軻亦云禍福無不自巳求之者何謂福國之安榮是也何謂禍國之危辱是也選拔賢俊惠恤黎元與治世同道斯安榮矣惟姦憸是用惟暴虐是作與亂世同事斯危辱矣黎侯之失國無乃顚倒是非以自取危辱乎方其南面以朝羣臣威福豫奪無不在我亦可謂安榮矣及夫逐于狄人不能自保而托迹于他邦其名雖曰寓公實與羣臣無異春秋傳所謂既為人君又為人臣是也烏在其為安榮乎黎之臣于當是之時不能規正其君迫于患難則怨他邦之不相恤他邦信有罪矣黎侯獨無罪乎向使黎侯能治其國任賢愛民以植不拔之基則何至于危辱如是必有以自取之也乍見孺子將入井怵惕惻隱之心不期而自發今鄰國之君託迹于我而邈如不聞衛之君臣其亦不仁甚矣黎不能自責衛不能恤難其失均也昔者楚王遭闔廬之難越在草莽有申包胥者乞師秦廷哭聲不絶秦人哀而救之二國併力遂卻吳師蓋有以感動之也黎之羣臣不知出此惟衛人是責何哉雖然重耳非不賢也十九年在外非秦伯納之則不能自反其國況黎侯乎鄰國是責亦不為過此所謂詩可以怨也孔子取而列之國風有以也夫泉水篇臣聞禮者人之大防所以檢柅此心不敢放逸也故書曰以禮制心禮之制人猶隄之防水不以隄為固而驟決之則潰裂四出大為民害矣不以禮自檢而輕棄之則縱橫放肆淪胥為惡矣女子之思歸人之常情也然父母既終無歸寧之道嫌疑所在何可不謹古者女子許嫁而笄非有大故不入其門既嫁而返兄弟弗與同席而坐弗與同器而食所以别嫌明微防于未然者若是其嚴哉父母猶在歸于親旁安慰其心禮所當然也父母既殁兄弟雖我同氣非有鞠養劬勞之恩其又可歸乎歸若未害也然此心一縱或至于不保其身則害莫大焉漢史所謂知其非禮而不能自還者是也齊襄公鳥獸之行瀆亂禮經詩人至以雄狐目之亦惟姜氏不謹其始無故而歸所以至此也然則泉水之詩聖人列于國風豈非所以立萬世之大間歟淇衛水也泉水猶注鄉邦我心寧不思衛故欲與從行之娣姪議所以歸國者人情之至切也宿于泲餞于禰記嫁時所歷之地父母兄弟訣别今無故而歸乎雖有姑姊惟當遣人問訊而已終不可歸也然歸心既動不能自巳宿于干餞于言雖思歸衛所歷之地將脂牽其車遄臻于衛又以此事雖名無瑕其實有害故復止焉天下之患莫大于自謂無害為非所當為欲非所當欲其初曰是小過耳吾何害之有積而不止遂陷于大惡為君為臣而有是念則不得其為君為臣父也子也亦然今衛女檢制此心知其有害而不敢縱此所謂發乎情止乎禮義者肥泉須漕思之切而禮不可歸憂懷鬱結出遊以寫之此心無一毫之纍可謂賢女矣兹聖人之所以有取歟北門篇臣聞人不可無志志在修身者其德必日進志在立事者其業必日廣仕者所以行其志也古者朝廷有道公論著明德有大小故位有高下位有高下故祿有厚薄豈有忠良之臣而不得志于時者哉今觀此詩賢者出北門而憂心殷殷焉言北者謂背陽而向隂也陽猶休明之時隂猶濁亂之世背陽而向陰則濁亂可知矣然當時之忠良以為祿之厚歟則終窶且貧莫知我艱其祿固未嘗厚也以為位之卑歟則王事適我矣政事一埤益我矣王事厚我矣政事一埤遺我矣適我謂事紛至于我也埤益謂厚且增也事如此之多祿如此之薄若不相稱然以理推之是必事繁而位卑非高爵也故其祿亦薄上而君不見知下而妻子謫我摧我居濁亂之世所遇若此何以為懷哉安于天命順受之斯可矣賢之用舍關乎盛衰固有命焉非人所能為也雖然賢者以此自處則可人君以此待賢者則不可孟子曰尊賢使能俊傑在位則天下之士皆悅而願立乎朝矣夫悅于任職而不委之天治世之事也君人者可不監觀于此哉北風篇臣聞人君之為政莫善于寬仁莫不善于威虐寬仁則民愛之威虐則民畏之愛之若父母焉畏之若仇讎焉父母之親不忍一日離而仇讎之惡惟恐其不相遠也為人上者不能撫愛其民而專以威虐從事人心豈有不離者哉人皆去之君誰與立則是戕其民者乃所以自戕也豈不甚可懼哉北方肅殺之風凛乎可畏而加之大雪其寒益甚所以喻衛君之威虐也惠而好我攜手同行畏其慘酷與其所好相率而去之也虛徐寬舒之貌亟急也只且語助也若或遲遲其行則其禍急言不能一日自保也次章亦然至于三章所謂莫赤匪狐莫黑匪烏則今日之當去顯然如狐赤而烏黑無可疑者理所當去而遲回不去其禍豈不愈速乎人心乖離一至于此疾之如仇讎矣君者民之父母而疾如仇讎孤立于上國勢岌岌威虐之所致也竝為威虐則不獨衛君為然亦必有同惡相濟者此所以重失人心也今仁聖在上子惠黎元可謂至矣而監司帥守猶有急于財賦刻剝窮民者亦有敢行誅殺害及流民者此皆不仁之人為國失人心者也人心一失所係甚大伏惟聖主哀之救之以活生民之命告之戒之以衰酷吏之風此誠今日之急務也干旄篇臣嘗觀孟子聞魯欲使樂正子為政喜而不寐公孫丑問其故則曰其為人也好善好善優于天下而况魯國乎夫茍好善人將輕千里而來告之以善夫茍不好善曰豫既巳知之訑訑之聲音顔色拒人于千里之外則讒諂面諛之人至矣與讒諂面諛之人居國欲治可得乎嗚呼若孟子者可謂深知為國之要道矣夫使之為政安危理亂皆由是出豈徒以一身事其君哉虛心屈己旁求衆善以自輔其所不逮則可以當此重任矣自矜其能不復求助忠告蔑聞而諂諛日親則何以治其國哉今觀干旄之詩衛之臣子何其好善之篤干首之有旄鳥隼之為旟析羽之為旌皆卿大夫之所載也浚衛邑也城外謂之郊居民所聚謂之都城則浚邑之城也素絲束帛也卿大夫誠心好善或求諸都邑之中或求諸郊野之外多方搜訪幸而得之則以束帛良馬將其誠意心之篤切形見于此所以有加而無已也彼姝者子指卿大夫之姝美也誠心好善如恐不及其德可謂美矣故賢者感之莫不曰吾將何以卑之豫之告之乎此所以如影之隨形響之應聲也嗚呼珠玉無脛而至于前惟其好之爾難合自重之士有所抱負豈肯輕以語人今而輸寫心腹樂告以善致敬盡禮感之使然也區區一小國而臣子皆好善當時賢者亦皆以善道告之同聲相應同氣相求翕然有濟濟多士之風國安得而不興乎雖然是有本有原一國之事人君為之也一舉一錯之間是非美惡由是分焉故夫好賢樂善臣子之懿德也而所以任用之者其誰歟妒賢嫉能臣子之大罪也而所以登進之者又誰歟沿流探源其責固有在矣此詩人所以必歸其美于衛侯也人君觀此足以知為治之大端矣考槃篇臣聞國之所恃以安彊者以得賢也故曰不有君子其能國乎又曰不信仁賢則國空虛賢者抱道懷德君能用之則邦家之福不能用之則獨善其身古之明君深達是理故求賢惟恐其不及其或潔身遁世自放于寂寞之濱人君必反而自思曰彼賢也宜為我用而有所不屑得非氣類差殊不足以感召之歟吾進德而不懈則誠心感通庶乎悅而願立于朝矣莊公之先公是為武公篤于好善能聽其規諫而厥子弗克遵業使賢者退而窮處此考槃之詩所以作也考成也槃樂也碩大之賢君不能用潛伏于澗于阿于陸俯仰無愧自全其樂所謂考槃也矢陳也諼忘也惓惓于君寐覺而言不能忘也弗過者不得過君之朝弗告者不得告君以善三章所陳久而不已所謂永矢也賢者抱負不淺其君疏而擯之不得有所展布怨而不釋人情之常也今此詩無一怨辭而忠愛之意膠固而不可解易之否曰拔茅貞吉志在君也當否隔之時賢者在野貞固其守而心常存乎君此則考槃之碩人也有如是之賢而莊公不能用將誰與治其國乎後之為人上者三復此詩深以莊公為戒勤求賢士毋使考槃于荒野之間則可以立邦家之基矣芄蘭篇臣聞人君之德莫大于剛健人君之患莫甚于柔弱剛健則日進無疆足以有為于當世柔弱則安于茍且不能少見于事業智愚相去豈不遠哉今一介之士茍惟柔弱則不能自立于鄉黨況于國君一舉一錯安危所關其可以柔弱自處乎惠公者宣姜之子朔也不疆于為善而忍于為惡子之得罪朔實為之即位之後上不能以禮防間其母下不能制公子頑之惡至柔至弱擁虛器于人上何足以君其國乎芄蘭者柔弱蔓延之草也支枝也觿所以解結成人之服也國君雖童子猶服成人之服觿則佩矣能則無有也凡人或有所長人皆得而知之今曰能不我知則是塊然而已爾芄蘭之葉如佩韘之狀韘決也韘則佩矣能則不我甲也天之十日以甲為首故事物之最先者皆謂之甲人亦如是今曰能不我甲則才不足以髙世矣容容刀也遂佩遂也悸帶垂而動也服飾若是皆如成人而不見其有能豈非其所大闕歟凡人皆不可以無能而君尤不可以無能人而無能其害止于一身君而無能其害及于一國紀綱之不振法度之不修人心之不服國勢之不疆皆柔弱無能之故為人上者可不懼哉木瓜篇臣聞德不足以感人者不足以言德惠不足以感人者不足以言惠古之人所以甚異于常人者惟其感人之深而已故易曰聖人感人心而天下和平三代而上人心愛戴其君久而不能忘者由此道也自入春秋五霸迭興大抵雜以權術惟己是利遑恤其他而惟齊桓公案桓公原本避宋欽宗諱作威公今改正後倣此存亡繼絶與人同利猶有治世之遺風焉今觀木瓜之詩何其圖報之無窮也瓜與桃李皆以木言以别于瓜瓞羊桃雀李而已非難得之物也投以易得之物而報以難得之貨亦云可矣猶曰非敢為報姑永以為好而已言有盡而意無窮何時而可忘耶考之左氏傳而後知齊之于衛有生死肉骨之恩焉衛自滎澤之敗國為墟矣遺民無幾何以自立桓公戍之以甲兵遺之以車馬器械絶而復續跲而復振無國而復有國豈非生死肉骨之恩乎興滅國繼絶世天下之民歸心焉此聖人之垂訓而桓公得之邢遷如歸衛國忘亡亂離之餘安堵如故安得而不深感之歟或曰今北敵垂亡不保朝夕與衛國敗于滎澤之役亦何以異我朝垂德惠以覆護之使既微而復振將滅而復存可乎曰不然也衛中國之諸侯也為狄人所滅故霸主不得不救今北敵中國之世讎也因其敗壞張皇六師為復讎刷恥之舉可也其可救哉書曰兼弱攻昧取亂侮亡此成湯之所以興也惟聖主深察之黍離篇臣聞王業之方盛人皆歡樂而詠歌之王業之既衰人皆愁苦而哀傷之故大序曰治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困觀夫音之不同而世道之升降斷可識矣周之盛也合天下而歸往焉故謂之王及其衰也名雖為王其實相戾于是降而為國風直與諸侯等爾可不哀哉京周即鎬京天下之所宗也成王之營洛邑取夫朝貢之道里均有時㑹諸侯于此其實仍居鎬京爾平王懲幽王之禍畏犬戎之彊徙于東都而宗周遂不復至曩時定都之地變而為禾黍之場周大夫過之思先王之盛不可復見所以不堪其憂也稷始而苗中而穗終而實蓋注目者屢矣如醉則甚于搖搖如噎則又甚于如醉言其憂愈深也呼天而告之曰所以致此者何人哉不以衰弱之故而虧君臣之義此所以微其辭也嗚呼周雖不競鎬京之地猶在境內而忠臣過之猶悲憂如此況有甚于此者乎我國家建都于汴既九朝矣宗廟宫闕于是乎在靖康之禍鞠為禾黍非能如東周之在境內神臯未復敵久據之往時朝㑹之地今為敵人之居此天地之大變國家之大恥也使周大夫生于今日過其故都其悲憂慘戚之情又當如之何哉平王惟不自彊所以迄不能復西都之盛聖主誠能反其所為臥薪嘗膽以復讎刷恥自期則大勳之集指日可俟也人情之慘戚將轉而為歌謡豈不偉哉惟聖主亟圖之揚之水篇臣聞人君有剛德則朝廷無過舉夫人君所以臨制四方役使羣動者惟其剛也是非可否之皆當于理先後緩急之不失其序惟至剛者能之不剛則顚倒錯亂當為者不能為而不當為者反為之矣平王之母家申侯也幽王嬖褒姒而黜申后太子奔申申侯與犬戎攻宗周而幽王隕晉侯鄭伯迎太子于申而立之是為平王則申侯者乃平王之父讎也悼王室之中微痛讎恥之未刷奮然作興恢張紀綱以正申侯之罪則天王之剛德也讎之不復懷其私恩又從而戍之弱孰甚焉此人心之所以不服也諸侯有難方伯連帥率諸侯以戍之義當然爾王畿之卒僅足以自衛其可逺戍乎平王為其所不當為諸侯不服莫為我用而自以畿卒戍之王室自是而愈卑矣悠揚緩弱之水雖束薪束楚束蒲之微不能流轉以喻平王之不能役使諸侯也彼其之子指當時之侯國言之申甫許皆姜姓故言申而併及甫許焉戍兵無幾不能更代未有還歸之日此周人之所以怨思也父讎當復而不能復母家不當戍而戍之顚倒錯亂如此安在其為剛德乎嗚呼居九五之尊位億兆之上賞慶刑威莫不在我而柔弱如悠揚之水亦可憐也君天下者三復是詩盍亦勵精求治自强不息而深以平王之柔弱為戒哉潔齊毛詩經筵講義卷三
